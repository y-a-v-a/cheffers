name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run spec tests
        run: cargo test --test spec_fixtures --verbose

      - name: Run all tests
        run: cargo test --workspace --verbose

  wasm:
    name: WebAssembly Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # Provides both `wasm-bindgen` (build) and `wasm-bindgen-test-runner`
      # (tests). Must match the version pinned in crates/cheffers-wasm/Cargo.toml.
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.100

      - name: Clippy (wasm wrapper)
        run: cargo clippy -p cheffers-wasm --all-features -- -D warnings

      - name: Build wasm32 target
        run: cargo build --release --target wasm32-unknown-unknown -p cheffers-wasm

      # Runs the run_chef binding in a real wasm runtime via Node (provided by
      # the runner image), exercising wasm-bindgen end to end.
      - name: Run wasm integration tests
        run: cargo test -p cheffers-wasm --target wasm32-unknown-unknown --test web

  web:
    name: Web Playground Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/editor/package-lock.json

      - name: Install playground dependencies
        working-directory: docs/editor
        run: npm ci

      - name: Build editor bundle
        working-directory: docs/editor
        run: npm run build

      - name: Run JS unit tests
        working-directory: docs/editor
        run: npm test

      - name: Install Playwright Chromium
        working-directory: docs/editor
        run: npx playwright install --with-deps chromium

      # Serves docs/ and drives the page in headless Chromium. The committed
      # wasm artifacts in docs/editor/pkg/ are used as-is.
      - name: Run browser end-to-end test
        run: ./scripts/test-browser.sh
