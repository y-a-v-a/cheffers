<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cheffers — Chef Playground</title>
  <meta name="description" content="Write and run Chef recipes in your browser. A JsBin-style playground powered by the Cheffers Rust interpreter compiled to WebAssembly." />
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍳</text></svg>' />
  <link rel="stylesheet" href="./editor.css" />
  <!-- Apply the saved theme before first paint to avoid a flash of the
       default palette. The header toggle (editor.js) keeps this in sync. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("cheffers-theme");
        if (t && t !== "system") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="toolbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🍳</span>
      <span class="title">Cheffers Playground</span>
    </div>
    <div class="controls">
      <label class="examples">
        Example:
        <select id="examples" aria-label="Load an example recipe"></select>
      </label>
      <label class="autorun">
        <input type="checkbox" id="autorun" checked />
        Auto-run
      </label>
      <label class="wrap">
        <input type="checkbox" id="wrap" checked />
        Wrap
      </label>
      <button id="run" type="button">Run ▶</button>
      <button id="theme" class="theme-toggle" type="button" aria-label="Theme: System. Click to change.">🖥️</button>
    </div>
  </header>

  <main class="panes">
    <section class="pane editor-pane">
      <div class="pane-header">Recipe</div>
      <div id="editor" class="editor-host"></div>
      <div class="pane-header input-header">
        Input
        <span class="hint">numbers for “Take … from refrigerator”</span>
      </div>
      <textarea id="stdin" class="stdin" rows="2" spellcheck="false"
                aria-label="Input values for Take instructions"
                placeholder="One number per Take instruction, e.g. 21"></textarea>
    </section>
    <section class="pane output-pane">
      <div class="pane-header">
        Output
        <span id="status" class="status" role="status"></span>
      </div>
      <pre id="output" class="output" aria-live="polite"></pre>
    </section>
  </main>

  <footer class="footer">
    Runs entirely in your browser via WebAssembly — nothing is sent to a server.
    <a href="https://github.com/y-a-v-a/cheffers">Source on GitHub</a> ·
    <a href="https://www.dangermouse.net/esoteric/chef.html">About the Chef language</a>
  </footer>

  <script type="module" src="./editor.bundle.js"></script>
</body>
</html>
